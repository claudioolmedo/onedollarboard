              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />

    </div>

  <script>
    document.getElementById('y').textContent = new Date().getFullYear();

    // Force direct download for GitHub links (cross-origin download attribute is ignored)
    document.querySelectorAll('a.js-direct-download').forEach(function (a) {
      a.addEventListener('click', function (e) {
        e.preventDefault();
        var url = this.getAttribute('href');
        var filename = url.split('/').pop();
        var fetchUrl = url.replace(/github\.com\/([^/]+\/[^/]+)\/raw\/([^/]+)\//, 'https://raw.githubusercontent.com/$1/$2/');
        fetch(fetchUrl)
          .then(function (r) { return r.blob(); })
          .then(function (blob) {
            var blobUrl = URL.createObjectURL(blob);
            var tmp = document.createElement('a');
            tmp.href = blobUrl;
            tmp.download = filename;
            tmp.style.display = 'none';
            document.body.appendChild(tmp);
            tmp.click();
            document.body.removeChild(tmp);
            URL.revokeObjectURL(blobUrl);
          })
          .catch(function () { window.open(url, '_blank'); });
      });
    });
  </script>
